name: Verify npm tag matches package.json
description: Ensures git tag version matches package.json version

inputs:
  tag-prefix:
    description: Tag prefix (default v)
    required: false
    default: 'v'

runs:
  using: 'composite'
  steps:
    - name: Verify tag matches package.json version
      shell: bash
      run: |
        TAG="${GITHUB_REF_NAME}"
        PREFIX="${{ inputs.tag-prefix }}"

        VERSION_FROM_TAG="${TAG#$PREFIX}"
        PACKAGE_VERSION="$(node -p "require('./package.json').version")"

        echo "Tag: $TAG"
        echo "Tag version: $VERSION_FROM_TAG"
        echo "Package version: $PACKAGE_VERSION"

        if [ "$VERSION_FROM_TAG" != "$PACKAGE_VERSION" ]; then
          echo "::error::Tag version ($VERSION_FROM_TAG) does not match package.json version ($PACKAGE_VERSION)"
          exit 1
        fi
